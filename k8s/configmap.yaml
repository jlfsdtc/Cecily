apiVersion: v1
kind: ConfigMap
metadata:
  name: kylin-config
  namespace: kylin
data:
  KYLIN_SERVER_HOST: "0.0.0.0"
  KYLIN_SERVER_PORT: "7070"
  KYLIN_METADATA_DB_URL: "postgres://kylin:password@postgres:5432/kylin"
  KYLIN_DATA_DIR: "/app/data"
  KYLIN_MAX_CONCURRENT_JOBS: "4"
  KYLIN_LOG_LEVEL: "info"
