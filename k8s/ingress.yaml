apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kylin
  namespace: kylin
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - kylin.example.com
    secretName: kylin-tls
  rules:
  - host: kylin.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kylin
            port:
              number: 80
